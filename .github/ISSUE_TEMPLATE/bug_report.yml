name: Bug Report
description: Report a bug in aigent-team
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `aigent-team generate`
        2. ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config file
      description: Paste your `aigent-team.config.json` (remove sensitive data).
      render: json
  - type: dropdown
    id: platform
    attributes:
      label: Target platform(s)
      multiple: true
      options:
        - Claude Code
        - Cursor
        - Codex
        - Antigravity
  - type: input
    id: version
    attributes:
      label: aigent-team version
      placeholder: "0.1.0"
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
